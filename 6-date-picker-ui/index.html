<body>
    <h1>Date Picker UI</h1>
    <div id="pallete">
        <div id="placeholder">
            <div id="placeholder-text">03/06/2026</div>
            <div id="placeholder-btn-icon">
                <i class="bi bi-calendar-day"></i>
            </div>
        </div>
        <div id="calendar">
            <div id="calendar-top">
                <div id="month-selector">
                    <span id="arrow-left">
                        <i class="bi bi-arrow-left-circle-fill"></i>
                    </span>
                        JULY 2026
                    <span id="arrow-right">
                        <i class="bi bi-arrow-right-circle-fill"></i>
                    </span>
                </div>
                <div id="weekdays">
                    <div class="weekday">S</div>
                    <div class="weekday">M</div>
                    <div class="weekday">T</div>
                    <div class="weekday">W</div>
                    <div class="weekday">T</div>
                    <div class="weekday">F</div>
                    <div class="weekday">S</div>
                </div>
            </div>
            <div id="calendar-bottom">
                <!-- WEEK ONE -->
                <div class="date empty">28</div>
                <div class="date empty">29</div>
                <div class="date empty">30</div>
                <div class="date filled">1</div>
                <div class="date filled">2</div>
                <div class="date filled" id="today">3</div>
                <div class="date filled">4</div>

                <!-- WEEK TWO -->
                <div class="date filled">5</div>
                <div class="date filled">6</div>
                <div class="date filled">7</div>
                <div class="date filled">8</div>
                <div class="date filled">9</div>
                <div class="date filled">10</div>
                <div class="date filled">11</div>

                <!-- WEEK THREE -->
                <div class="date filled">12</div>
                <div class="date filled">13</div>
                <div class="date filled">14</div>
                <div class="date filled">15</div>
                <div class="date filled">16</div>
                <div class="date filled">17</div>
                <div class="date filled">18</div>

                <!-- WEEK FOUR -->
                <div class="date filled">19</div>
                <div class="date filled">20</div>
                <div class="date filled">21</div>
                <div class="date filled">22</div>
                <div class="date filled">23</div>
                <div class="date filled">24</div>
                <div class="date filled">25</div>

                <!-- WEEK FIVE -->
                <div class="date filled">26</div>
                <div class="date filled">27</div>
                <div class="date filled">28</div>
                <div class="date filled">29</div>
                <div class="date filled">30</div>
                <div class="date filled">31</div>
                <div class="date empty">1</div>
            </div>
        </div>
    </div>
    <a href="https://roadmap.sh/projects/datepicker-ui" class="ref-cta" target="_blank">Go to Project of Reference</a>
</body>
</html>
