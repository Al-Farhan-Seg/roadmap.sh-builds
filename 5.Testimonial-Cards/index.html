<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonial Cards</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="container">
        <div class="top-row">
            <div class="bubble-testimony">
                <div class="bubble">

                </div>
                <div class="bubble-person">
                    <img src="" alt="">
                    <div>
                        <p class="bubble-person-name"></p>
                        <p class="bubble-person-role"></p>
                    </div>
                </div>
            </div>

            <div class="box-testimony">
                <div class="box">

                </div>
                <div class="box-person">
                    <img src="" alt="">
                    <div>
                        <p class="box-person-name"></p>
                        <p class="box-person-role"></p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mid-row">
            <div class="single-image">
                <img src="./assets/passport_pic_cartoon.png" alt="">
            </div>

            <div class="text-only-testimony">
                <p class="stars">⭐⭐⭐⭐⭐</p>
                <p class="txt-person-name">Farhan Segujja</p>
                <p class="txt-person-role">FullStack Developer</p>
                <p class="txt-comment">I find myself recommending roadmap.sh to all the internees or junior developers. It's a great way to skill up and grow in your career.</p>
            </div>
        </div>
        
        <div class="bottom-row">
            <div class="full-width-testimony">

            </div>
        </div>
        

    </div>
    
</body>
</html>
