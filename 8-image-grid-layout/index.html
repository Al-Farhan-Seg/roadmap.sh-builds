<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a grid layout of images using HTML and CSS.">
    <title>Image Grid Layout</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="assets/grid-favicon.png" type="image/x-icon">
</head>
<body>
    <h1>Image Grid Layout</h1>
    <main id="grid-container">
        <img
            class="image"
            id="img-1"
            src="assets/foggy-beach.jpg"
            alt="Foggy Beach Image"
        >

        <img
            class="image"
            id="img-2"
            src="assets/living-room.jpg"
            alt="White interior living room"
        >

        <img
            class="image"
            id="img-3"
            src="assets/table-topped-with-mug.jpg"
            alt="Brown table with a brown mug on top"
        >

        <img
            class="image"
            id="img-4"
            src="assets/red-door-building.jpg"
            alt="Building with a red door"
        >

        <img
            class="image"
            id="img-5"
            src="assets/white-apartments.jpg"
            alt="A number of white apartments"
        >

        <img
            class="image"
            id="img-6"
            src="assets/beach-top-view.jpg"
            alt="Top view of a blue water beach"
        >
    </main>
    <a href="https://roadmap.sh/projects/image-grid" class="ref-cta" target="_blank">Go to Project of Reference</a>

    
</body>
</html>
