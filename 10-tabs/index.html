<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a simple tabs component using HTML, CSS, and JavaScript.">
    <title>Tabs</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Simple Tabs</h1>
    <main class="container">
        <nav id="navbar">
            <div class="tabs" id="tab1">First Tab</div>
            <div class="tabs" id="tab2">Second Tab</div>
            <div class="tabs" id="tab3">Third Tab</div>
            <div class="tabs" id="tab4">Fourth Tab</div>
        </nav>
        
        <div id="content-box">
            <div id="content1"></div>
            <div id="content2"></div>
            <div id="content3"></div>
            <div id="content4"></div>
        </div>
    </main>
    
</body>
</html>
