<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Form UI</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <h1>Accessible Form UI</h1>
    <section class="palette">
        <form action="" method="get">
            <fieldset>
                <label for="full-name">Full Name</label>
                <input 
                    type="text" 
                    name="full-name" 
                    aria-required
                    required 
                    id="full-name"
                    placeholder="What should we call you?"
                >
            </fieldset>

            <fieldset>
                <label for="email">Email</label>
                <input 
                    type="email" 
                    name="email" 
                    aria-required
                    required 
                    id="email"
                    placeholder="firstname@gmail.com"
                >
            </fieldset>

            <fieldset>
                <label for="password">Password</label>
                <input 
                    type="password"
                    name="password" 
                    required 
                    aria-required
                    id="password"
                    placeholder="********" 
                    aria-describedby="password-error"
                    minlength="8"
                >
                <p id="password-error">Password must contain at least 8 characters.</p>
            </fieldset>

            <fieldset>
                <label for="confirm-password">Confirm Password</label>
                <input 
                    type="password" 
                    name="confirm-password" 
                    required aria-required 
                    id="confirm-password" 
                    placeholder="********" 
                    minlength="8"
                >
            </fieldset>

            <input 
                type="submit"
                value="Update Profile"
                id="submit"
            >
        </form>
        <article>
            <span id="percentage">65%</span>
            <h2>Profile Completeness</h2>

            <div class="checklist">
                <p class="done">Create Account</p>
                <p class="done">Update Roadmap Progress</p>
                <p class="done">Setup Public Profile</p>
                <p>Complete your first project</p>
                <p>Invite your friends</p>
            </div>
        </article>
    </section>

    <a href="https://roadmap.sh/projects/accessible-form-ui" class="ref-cta" target="_blank">Go to Project of Reference</a>
</body>
</html>
