name: Update README project tracker

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate project tracker
        run: node scripts/update-readme.mjs

      - name: Commit generated changes
        shell: bash
        run: |
          if git diff --quiet -- README.md scripts/projects-fallback.json; then
            echo "The README tracker is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md scripts/projects-fallback.json
          git commit -m "docs: update frontend project tracker [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
