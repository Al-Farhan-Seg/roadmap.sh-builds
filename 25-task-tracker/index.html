<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="../top_assets/favicon-F.png">

    <!-- Primary Meta Tags -->
    <meta name="title" content="Task Tracker | Al-Farhan Frontend Projects">
    <meta name="description" content="An interactive task tracker built with HTML, CSS, and JavaScript for adding, completing, and deleting tasks with dynamic, no-reload updates.">

    <!-- Open Graph / Facebook / WhatsApp / LinkedIn -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://roadmapsh.farhansegujja.com/25-task-tracker/index.html">
    <meta property="og:title" content="Task Tracker | Al-Farhan Frontend Projects">
    <meta property="og:description" content="An interactive task tracker built with HTML, CSS, and JavaScript for adding, completing, and deleting tasks with dynamic, no-reload updates.">
    <meta property="og:image" content="https://roadmapsh.farhansegujja.com/top_assets/favicon-F.png">
    <meta property="og:image:alt" content="Al-Farhan favicon">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://roadmapsh.farhansegujja.com/25-task-tracker/index.html">
    <meta name="twitter:title" content="Task Tracker | Al-Farhan Frontend Projects">
    <meta name="twitter:description" content="An interactive task tracker built with HTML, CSS, and JavaScript for adding, completing, and deleting tasks with dynamic, no-reload updates.">
    <meta name="twitter:image" content="https://roadmapsh.farhansegujja.com/top_assets/favicon-F.png">
    <meta name="twitter:image:alt" content="Al-Farhan favicon">
</head>
<body>
    <h1 id="project-name">Task Tracker</h1>
    <section>
      <form action="" method="get" accept-charset="utf-8" id="form">
        <input type="text" name="title" id="title-field" placeholder="My task to be done"/>
        <textarea name="description" id="description-field" rows="15"  placeholder="A description of the task I am supposed to do"></textarea>
        <button id="submit-btn" type="submit">
          Add New Task
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-plus-icon lucide-circle-plus"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
        </button>
      </form>

      <div id="display-container">
        <div id="pending-container">
          <h2 id="pending-title">Pending Tasks</h2>
          <div class="entry">
            <input type="checkbox" id="pending-cb-1" class="pending-cb">
            <label id="pending-lb-1" class="pending-lb">Eating food</label>
            <button class="delete-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash-icon lucide-trash"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button> 
          </div>
          
        </div>

        <div id="completed-container">
          <h2 id="completed-title">Completed Tasks</h2>
          <div class="entry">
            <input type="checkbox" id="completed-cb-1" class="completed-cb" checked onclick="return false;">
            <label id="completed-lb-1" class="completed-lb">Cooking food</label>
            <button class="delete-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash-icon lucide-trash"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button> 
          </div>
          
        </div>
      </div>
    </section>

    <a href="https://roadmap.sh/projects/task-tracker-js" class="ref-cta" target="_blank">Go to Project of Reference</a>

    <!--
      ----Deletion Icon ------
    <i class="bi bi-trash3"></i> -->
    
    
    
    <script src="script.js"></script>
</body>
</html>
